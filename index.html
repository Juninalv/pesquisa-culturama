<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="culturama-favico.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <main>
 <header>
        <img src="img/logo-culturama.png" alt="logo culturama">
        <h1>Pesquisa de Opinião</h1>
    </header>
    <section>
        <form action="sucesso.html" method="get">
            <fieldset>
            <legend>Dados Pessoais</legend>
            
            <label for="userName">Nome:</label>
            <input id="userName" type="text" name="userName" required>
            <br>
            <label for="userAge">Idade:</label>
            <input id="userAge" type="number" name="userAge" min="12" max="100" required>
            <br>
            <label for="userBirthDate">Data de Nascimento:</label>
            <input id="userBirthDate" type="date" name="userBirthDate">
            <br>
            <label for="userEmail">Email:</label>
            <input id="userEmail" type="email" name="userEmail" required>
            <br>
            <label for="userPhone">Telefone:</label>
            <input id="userPhone" type="tel" name="userPhone" pattern="[0-9]{11}" placeholder="DDD + número" aria-describedby="phoneHelp"> <small>Preencha com 11 dígios no formato DDD + número</small>
            <br>
            <label for="userImage">Upload de foto</label>
            <input id="userImage" type="file" accept="image/*" name="userPhoto" aria-describedby="imageHelp"> <small id="imageHelp">Envie uma foto no formato PNG ou JPEG</small>
            <br>
            </fieldset>
            
            <fieldset>
                <legend>Perfil</legend>
                <p>Genêro:</p>
                <input id="female" type="radio" name="userGender" value="Feminino">
                <label for="female">Feminino</label>

                <input id="male" type="radio" name="userGender" value="Masculino">
                <label for="male">Masculino</label>

                <input id="preferNotToSay" type="radio" name="userGender" value="Prefiro não informar">
                <label for="preferNotToSay">Prefiro não informar</label>
                <br>

                <label for="maritalStatus">Estado civil:</label>
                <select id="maritalStatus" name="maritalStatus">
                    <option value="notInformed">Selecione:</option>
                    <option value="Casado">Casado</option>
                    <option value="Solteiro">Solteiro</option>
                    <option value="Divorciado">Divorciado</option>
                    <option value="Viúvo">Viúvo</option>
                    <option value="União estável">União estável</option>
                </select>
                

                <label for="userCity">Cidade:</label>
                <input id="userCity" type="text" name="userCity" autocomplete="address-level2" placeholder="Ex: Lagoinha">
        

                <label for="userState">Estado:</label>
                <select id="userState" name="userState" required>
                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">Bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distritoFederal">Distrito Federal</option>
                    <option value="espiritoSanto">Espirito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranhao">Maranhão</option>
                    <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                    <option value="matoGrosso">Mato Grosso</option>
                    <option value="minasGerais">Minas Gerais</option>
                    <option value="para">Pará</option>
                    <option value="paraiba">Paraíba</option>
                    <option value="parana">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaui">Piauí</option>
                    <option value="rioDeJaneiro">Rio de Janeiro</option>
                    <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                    <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santaCatarina">Santa Catarina</option>
                    <option value="saoPaulo">São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>
                </select>

            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais:</p>
                <input id="facebook" type="checkbox" name="social" value="facebook">
                <label for="facebook">Facebook</label>
                <br>
                <input id="instagram" type="checkbox" name="social" value="instagram">
                <label for="instagram">Instagram</label>
                <br>
                <input id="x" type="checkbox" name="social" value="X">
                <label for="x">X</label>
                <br>
                <input id="linkedin" type="checkbox" name="social" value="linkedin">
                <label for="linkedin">LinkedIn</label>
                <br>
                <input id="tiktok" type="checkbox" name="social" value="tiktok">
                <label for="tiktok">TikTok</label>
                <br>
                <input id="youtube" type="checkbox" name="social" value="youtube">
                <label for="youtube">YouTube</label>
                <br>
                <label for="musicStyle">Estilo Musical</label>
                <input id="musicStyle" type="text" name="musicStyle" list="styleTypes">
                <datalist id="styleTypes">
                    <option value="Rock"></option>
                    <option value="Pop"></option>
                    <option value="Eletrônica"></option>
                    <option value="Samba"></option>
                    <option value="Reggae"></option>
                    <option value="Funk"></option>
                    <option value="Hip Hop"></option>
                    <option value="Jazz"></option>
                    <option value="Classical"></option>
                    <option value="Sertanejo"></option>
                </datalist>
                <br>
                <label for="favoriteColor">Cor Favorita</label>
                <input id="favoriteColor" type="color" name="favoriteColor">
            </fieldset>

            <fieldset>
                <legend>Opnião</legend>
                <p>O que você acha da qualidade do nosso serviço?</p>

                <input type="radio" id="otimo" name="userServiceOpinion" value="otimo">
                <label for="otimo">Ótimo</label>
                <br>
                <input type="radio" id="bom" name="userServiceOpinion" value="bom">
                <label for="bom">Bom</label>
                <br>
                <input type="radio" id="regular" name="userServiceOpinion" value="regular">
                <label for="regular">Regular</label>
                <br>
                <input type="radio" id="ruim" name="userServiceOpinion" value="ruim">
                <label for="ruim">Ruim</label>
                <br>
                <input type="radio" id="péssimo" name="userServiceOpinion" value="péssimo">
                <label for="péssimo">Péssimo</label><br>

                <label for="comment">Escreva sua opinião:</label>
                <textarea name="userComment" id="comment" placeholder="Digite sua opinião aqui..."></textarea>
            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>

                <input type="checkbox" name="userLGPD" id="userLGPDTerm" value="accepted" required>
                <label for="userLGPDTerm">Li e concordo com a Política de Privacidade</label><br>

                <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                <label for="getResult">Desejo receber os resultados da pesquisa por e-mail</label><br>

            </fieldset>
            <button type="submit" aria-label="Enviar formulário">Enviar</button>
            <button type="reset" aria-label="Limpar formulário">Limpar</button>
        </form>
    </section>
    
    </main>
   
</body>
</html>
